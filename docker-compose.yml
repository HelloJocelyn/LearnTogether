services:
  livekit:
    image: livekit/livekit-server:v1.8
    command: --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

  backend:
    build:
      context: ./backend
    environment:
      - APP_EDITION=${APP_EDITION:-lite}
      - DATABASE_URL=sqlite:////data/app.db
      - CHECKIN_TZ=Asia/Tokyo
      - BADGE_CERT_DIR=/data/badge_certificates
      - ZOOM_MEETING_ID=${ZOOM_MEETING_ID:-}
      - ZOOM_PASSCODE=${ZOOM_PASSCODE:-}
      - ZOOM_JOIN_URL=${ZOOM_JOIN_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - livekit

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_MODE: ${BUILD_MODE:-lite}
    depends_on:
      - backend
      - livekit
    ports:
      - "5173:80"

volumes:
  backend_data:

